<!DOCTYPE html>
<html lang="pt-BR" data-theme="default">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubo - Detalhes do Livro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .details-page-wrapper {
            margin-top: 3rem;
            margin-bottom: 5rem;
        }

        .back-link-container {
            margin-bottom: 2rem;
        }

        .back-btn-details {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem 1.25rem;
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.09);
            border-radius: 12px;
            transition: var(--transition-smooth);
        }

        .back-btn-details:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateX(-4px);
        }

        .details-main-card {
            background: transparent;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            overflow: hidden;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 500px;
        }

        .details-cover-side {
            background: var(--cover-gradient-default);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .details-cover-side .cover-book-icon-lg {
            font-size: 7rem;
            color: rgba(255, 255, 255, 0.18);
            z-index: 2;
            text-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .details-info-side {
            padding: 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 2rem;
        }

        .error-container {
            text-align: center;
            padding: 5rem 2rem;
        }

        .error-container i {
            font-size: 4rem;
            color: #ef4444;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 768px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
            .details-cover-side {
                height: 240px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .details-info-side {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="mesh-glow mesh-glow-1"></div>
    <div class="mesh-glow mesh-glow-2"></div>

    <header class="app-header">
        <div class="header-container">
            <div class="logo-area">
                <i class="fa-solid fa-cube logo-icon" id="cube-icon"></i>
                <h1 class="brand-title"><a href="index.html" style="text-decoration: none; color: inherit;">Kubo</a></h1>
            </div>
            <p class="brand-subtitle">Biblioteca digital dos maiores autores</p>
        </div>
    </header>

    <main class="app-main">
        <div class="container details-page-wrapper">
            <div class="back-link-container">
                <a href="index.html" class="back-btn-details">
                    <i class="fa-solid fa-arrow-left"></i> Voltar para a Galeria
                </a>
            </div>

            <section id="details-section" class="details-main-card">
                <div style="padding: 4rem; text-align: center; color: var(--text-secondary);">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2.5rem; margin-bottom: 1rem;"></i>
                    <p>Carregando informações do livro...</p>
                </div>
            </section>
        </div>
    </main>
    <script src="assets/scripts/details.js"></script>
</body>
</html>
